<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>生活工作台</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  background:#000;
  height:100vh;
  overflow:hidden;
  font-family:system-ui;
  color:#eee;
}
/* 主界面容器 */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.main-circle{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#050508;
  border:1px solid #222;
  color:#e5e5e5;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 35px #4050ff26;
  cursor:pointer;
  transition:all 0.3s ease;
}
.main-circle:active{
  transform:scale(0.96);
}
.sub-circle{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#06060a;
  border:1px solid #222;
  color:#ccc;
  font-size:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #4050ff1a;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transition:all 0.4s ease;
}
.inspire-lib{ top:-150px; left:-160px; }
.calendar-btn{ top:-150px; right:-160px; }
.book-shelf{ bottom:-150px; left:50%; transform:translateX(-50%); }
.container.active .sub-circle{
  opacity:1;
  visibility:visible;
}

/* 日历全屏页面 */
.calendar-page{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:#000;
  display:none;
  z-index:999;
  padding:60px 15px 20px;
}
.back-btn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:18px;
  color:#88aaff;
  cursor:pointer;
}
/* 日历切换栏 */
.cal-tab{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}
.cal-tab button{
  flex:1;
  padding:10px;
  background:#0a0a12;
  border:1px solid #222;
  color:#ccc;
  border-radius:8px;
  cursor:pointer;
}
.cal-tab button.active{
  background:#4a4aff;
  color:#fff;
  border-color:#4a4aff;
}
/* 日历主体 */
.cal-wrap{
  width:100%;
  height:calc(100% - 120px);
  border:1px solid #222;
  border-radius:16px;
  padding:15px;
  overflow-y:auto;
}
.day-item{
  padding:12px;
  border-bottom:1px solid #222;
}
.day-item h4{
  color:#88aaff;
  margin-bottom:8px;
}
.day-item textarea{
  width:100%;
  height:60px;
  background:#050508;
  border:1px solid #333;
  border-radius:6px;
  padding:8px;
  color:#eee;
  outline:none;
  resize:none;
  font-size:14px;
}
</style>
</head>
<body>

<!-- 主界面 -->
<div class="container" id="wrap">
  <div class="main-circle" id="mainBtn">开始生活</div>
  <div class="sub-circle inspire-lib">灵感库</div>
  <div class="sub-circle calendar-btn" id="calBtn">日历</div>
  <div class="sub-circle book-shelf">书架</div>
</div>

<!-- 全屏日历页 -->
<div class="calendar-page" id="calPage">
  <div class="back-btn" onclick="backToMain()">返回</div>

  <!-- 日/周/月/年 切换 -->
  <div class="cal-tab">
    <button class="active" onclick="switchCal('day')">日</button>
    <button onclick="switchCal('week')">周</button>
    <button onclick="switchCal('month')">月</button>
    <button onclick="switchCal('year')">年</button>
  </div>

  <div class="cal-wrap" id="calContent">
    <!-- 日历内容 JS 自动生成 -->
  </div>
</div>

<script>
const wrap = document.getElementById('wrap');
const mainBtn = document.getElementById('mainBtn');
const calBtn = document.getElementById('calBtn');
const calPage = document.getElementById('calPage');
const calContent = document.getElementById('calContent');

// 主按钮展开收起
mainBtn.onclick = function(){
  wrap.classList.toggle('active');
};

// 打开日历
calBtn.onclick = function(){
  calPage.style.display = 'block';
  switchCal('day');
};

// 返回主界面
function backToMain(){
  calPage.style.display = 'none';
}

// 切换日周月年
function switchCal(type){
  // 切换按钮激活态
  document.querySelectorAll('.cal-tab button').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');

  let now = new Date();
  let y = now.getFullYear();
  let m = now.getMonth() + 1;
  let d = now.getDate();

  let html = '';
  if(type === 'day'){
    html = `
      <div class="day-item">
        <h4>今天：${y}年${m}月${d}日</h4>
        <textarea placeholder="今日计划 / 待办事项..."></textarea>
        <textarea placeholder="每日总结 / 心情记录..." style="margin-top:8px;"></textarea>
      </div>
    `;
  }else if(type === 'week'){
    html = `<h4 style="margin-bottom:10px;">${y}年第${getWeekNum()}周</h4>`;
    for(let i=0;i<7;i++){
      let date = getDayOfWeek(i);
      html += `
        <div class="day-item">
          <h4>${date}</h4>
          <textarea placeholder="计划 / 总结..."></textarea>
        </div>
      `;
    }
  }else if(type === 'month'){
    html = `<h4 style="margin-bottom:10px;">${y}年${m}月</h4>
    <div style="line-height:1.8;color:#ccc;">本月日程、月度目标、月度总结 可自行记录</div>`;
  }else if(type === 'year'){
    html = `<h4 style="margin-bottom:10px;">${y}年</h4>
    <div style="line-height:1.8;color:#ccc;">年度目标、年度规划、整年复盘 记录处</div>`;
  }
  calContent.innerHTML = html;
}

// 工具：获取本周第几周
function getWeekNum(){
  let now = new Date();
  let start = new Date(now.getFullYear(),0,1);
  let diff = Math.floor((now - start) / (7*24*3600*1000));
  return diff + 1;
}
// 工具：获取本周每一天日期
function getDayOfWeek(off){
  let now = new Date();
  let day = now.getDay();
  let first = new Date(now.getTime() - (day-1)*24*3600*1000 + off*24*3600*1000);
  return first.getFullYear() + '年' + (first.getMonth()+1) + '月' + first.getDate() + '日';
}
</script>

</body>
</html>
