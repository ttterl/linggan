<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>网文实时灵感热度中枢</title>
<meta name="description" content="起点番茄飞卢七猫男频女频实时网文热榜，写作题材灵感工具">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;height:100vh;overflow:hidden;font-family:system-ui}
.center{position:absolute;top:50%;left:50%;transform: translate(-50%,-50%)}
.main{width:170px;height:170px;border-radius:50%;background:#050510;border:1px solid #222;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px #4a4aff33;cursor:pointer}
.main.active{width:110px;height:110px;opacity:0.4}
.dot{position:absolute;width:90px;height:90px;border-radius:50%;background:#080818;color:#ddd;display:none;align-items:center;justify-content:center;border:1px solid #333;font-size:15px;cursor:pointer}
.pop{position:fixed;top:50%;left:50%;transform: translate(-50%,-50%);background:#0c0c18;border-radius:20px;padding:22px;width:88%;max-width:460px;color:#eee;display:none;border:1px solid #2a2a44;max-height:75vh;overflow-y:auto}
.rank{margin:10px 0;padding-bottom:10px;border-bottom:1px solid #222}
.rank h4{color:#88aaff;margin-bottom:8px}
.close{position:absolute;top:14px;right:18px;font-size:24px;color:#aaa;cursor:pointer}
.time-tip{text-align:right;font-size:11px;color:#666;margin:-8px 0 10px}
.load{text-align:center;padding:20px;color:#999}
</style>
</head>
<body>
<div class="center">
<div class="main" id="big" onclick="start()">灵感</div>
<div class="dot" style="top:-140px;left:-120px" id="hot" onclick="showRank()">热度</div>
</div>

<div class="pop" id="rankBox">
<div class="close" onclick="backHome()">×</div>
<div class="time-tip" id="nowTime"></div>
<div class="load" id="loadTxt">正在抓取男频女频全网网文实时榜单...</div>
<div id="allData"></div>
</div>

<script>
function backHome(){
rankBox.style.display='none'
big.classList.remove('active')
hot.style.display='none'
}
function start(){big.classList.add('active');hot.style.display='flex'}

async function getNovelHot(){
  return await (await fetch("https://api.pearktrue.cn/api/novel/rank")).json();
}

async function showRank(){
  freshTime()
  rankBox.style.display='block'
  document.getElementById('loadTxt').style.display='block'
  document.getElementById('allData').innerHTML=''

  let html = '';
  try {
    let data = await getNovelHot();
    if(!data || !data.data){
      html = `<div class="rank"><h4>⚠️ 获取网文榜单失败</h4><p>接口拥堵，稍后再点</p></div>`;
    }else{
      // 男频专区
      html += `<div class="rank"><h4>📖 起点男频热门</h4>`;
      data.data.qidian?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;

      html += `<div class="rank"><h4>🍅 番茄男频飙升</h4>`;
      data.data.fanqie?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;

      html += `<div class="rank"><h4>⚡ 飞卢男频脑洞</h4>`;
      data.data.feilu?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;

      // 新增女频专区
      html += `<div class="rank"><h4>💮 起点女频热门</h4>`;
      data.data.qidian_nv?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;

      html += `<div class="rank"><h4>🌸 番茄女频爆款</h4>`;
      data.data.fanqie_nv?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;

      html += `<div class="rank"><h4>📜 七猫女频热榜</h4>`;
      data.data.qimao_nv?.slice(0,6).forEach((item,i)=>html += `${i+1}. ${item.title}<br>`);
      html += `</div>`;
    }
  } catch (e) {
    html = `<div class="rank"><h4>⚠️ 网络请求异常</h4><p>跨域或接口临时失效，稍后重试</p></div>`;
  }

  document.getElementById('allData').innerHTML = html;
  document.getElementById('loadTxt').style.display = 'none';
}

function freshTime(){
  const now = new Date();
  document.getElementById('nowTime').innerText = `男频女频实时同步 · ${now.toLocaleTimeString()}`;
}
</script>
</body>
</html>
