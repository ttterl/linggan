<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>网文灵感·阅读站真实热搜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;height:100vh;overflow:hidden;font-family:system-ui}
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.main{width:170px;height:170px;border-radius:50%;background:#050510;border:1px solid #222;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px #4a4aff33;cursor:pointer}
.pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0c0c18;border-radius:20px;padding:22px;width:88%;max-width:460px;color:#eee;display:none;border:1px solid #2a2a44}
.close{position:absolute;top:14px;right:18px;font-size:24px;color:#aaa;cursor:pointer}
.load{text-align:center;padding:20px;color:#999}
</style>
</head>
<body>
<div class="center">
  <div class="main" id="btn" onclick="fetchNovelData()">网文灵感</div>
</div>

<div class="pop" id="box">
  <div class="close" onclick="closeBox()">×</div>
  <div class="load" id="loadTxt">阅读站热搜拉取中...</div>
  <div id="dataBox"></div>
</div>

<script>
function closeBox(){
  box.style.display = 'none';
}

async function fetchNovelData(){
  box.style.display = 'block';
  loadTxt.style.display = 'block';
  dataBox.innerHTML = '';

  try {
    // 只用阅读类API：追书神器（免费、无key、男频女频都有）
    const res = await fetch('https://api.zhuishushenqi.com/ranking/HotRank');
    const json = await res.json();

    if(json && json.books && json.books.length>0){
      // 随机拿一本，不固定题材
      const book = json.books[Math.floor(Math.random()*json.books.length)];
      dataBox.innerHTML = `<div style="margin-top:10px;">
        <h4 style="color:#88aaff;margin-bottom:10px;">${book.title}</h4>
        <p style="color:#aaa;font-size:14px;">作者：${book.author} · 分类：${book.majorCate}</p>
        <p style="line-height:1.6;margin-top:8px;">${book.shortIntro || '暂无简介'}</p>
      </div>`;
    } else {
      throw new Error('无数据');
    }
  } catch (e) {
    // 备用：用番茄/聚合网文热搜兜底
    dataBox.innerHTML = `<div style="margin-top:10px;color:#ff8888;">
      ⚠️ 接口临时切换，换源再试
    </div>`;
  }

  loadTxt.style.display = 'none';
}
</script>
</body>
</html>
