<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>生活工作台</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  background:#000;
  height:100vh;
  overflow:hidden;
  font-family:system-ui;
  color:#eee;
}
/* 主界面 */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.main-circle{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#050508;
  border:1px solid #222;
  color:#e5e5e5;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 35px #4050ff26;
  cursor:pointer;
  transition:all 0.3s ease;
}
.main-circle:active{
  transform:scale(0.96);
}
.sub-circle{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#06060a;
  border:1px solid #222;
  color:#ccc;
  font-size:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #4050ff1a;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transition:all 0.4s ease;
}
.inspire-lib{ top:-150px; left:-160px; }
.calendar-btn{ top:-150px; right:-160px; }
.book-shelf{ bottom:-150px; left:50%; transform:translateX(-50%); }
.container.active .sub-circle{
  opacity:1;
  visibility:visible;
}

/* 日历全屏页 */
.calendar-page{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:#000;
  display:none;
  z-index:999;
  padding:60px 15px 20px;
}
.back-btn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:18px;
  color:#88aaff;
  cursor:pointer;
}
.cal-top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.day-nav-btn{
  padding:6px 12px;
  background:#0a0a12;
  border:1px solid #222;
  color:#88aaff;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
.cal-tab{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}
.cal-tab button{
  flex:1;
  padding:10px;
  background:#0a0a12;
  border:1px solid #222;
  color:#ccc;
  border-radius:8px;
  cursor:pointer;
}
.cal-tab button.active{
  background:#4a4aff;
  color:#fff;
  border-color:#4a4aff;
}
.cal-wrap{
  width:100%;
  height:calc(100% - 160px);
  border:1px solid #222;
  border-radius:16px;
  padding:15px;
  overflow-y:auto;
}
/* 可调节时刻表 */
.time-block{
  margin:10px 0;
  padding:12px;
  border:1px solid #222;
  border-radius:12px;
}
.time-block h5{
  color:#88aaff;
  font-size:15px;
  margin-bottom:8px;
}
.time-show{
  color:#ccc;
  font-size:14px;
  margin-bottom:6px;
}
input[type="range"]{
  width:100%;
  height:6px;
  background:#222;
  border-radius:3px;
  outline:none;
  -webkit-appearance:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#4a4aff;
  cursor:pointer;
}
textarea{
  width:100%;
  height:65px;
  background:#050508;
  border:1px solid #333;
  border-radius:8px;
  padding:10px;
  color:#eee;
  outline:none;
  resize:none;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container" id="wrap">
  <div class="main-circle" id="mainBtn">开始生活</div>
  <div class="sub-circle inspire-lib">灵感库</div>
  <div class="sub-circle calendar-btn" id="calBtn">日历</div>
  <div class="sub-circle book-shelf">书架</div>
</div>

<div class="calendar-page" id="calPage">
  <div class="back-btn" onclick="backToMain()">返回</div>

  <div class="cal-top-bar">
    <div style="color:#ccc;font-size:15px" id="curDateTitle"></div>
    <button class="day-nav-btn" onclick="saveTodayAndNext()">下一天</button>
  </div>

  <div class="cal-tab">
    <button class="active" onclick="switchCal('day')">日</button>
    <button onclick="switchCal('week')">周</button>
    <button onclick="switchCal('month')">月</button>
    <button onclick="switchCal('year')">年</button>
  </div>

  <div class="cal-wrap" id="calContent"></div>
</div>

<script>
const wrap = document.getElementById('wrap');
const mainBtn = document.getElementById('mainBtn');
const calBtn = document.getElementById('calBtn');
const calPage = document.getElementById('calPage');
const calContent = document.getElementById('calContent');

// 拆分后独立时段：早餐、午餐、晚餐、家务、工作、写作、游戏、睡眠
const defaultTimeTable = [
  {name:'睡眠休息', start:23, end:7},
  {name:'早餐', start:7, end:9},
  {name:'午餐', start:12, end:14},
  {name:'晚餐', start:18, end:20},
  {name:'家务琐事', start:9, end:11},
  {name:'固定工作时段', start:11, end:15},
  {name:'写作创作时段', start:15, end:19},
  {name:'休闲游戏放松', start:20, end:23}
];

// 当前选中日期偏移
let dayOffset = 0;

// 读取当日作息
function getTimeTable(){
  let todayKey = getDayKey();
  let allRecord = JSON.parse(localStorage.getItem('allTimeRecord') || '{}');
  if(allRecord[todayKey]){
    return allRecord[todayKey];
  }
  return JSON.parse(JSON.stringify(defaultTimeTable));
}

// 保存当日作息
function saveCurrTimeTable(){
  let todayKey = getDayKey();
  let currList = [];
  for(let i=0;i<defaultTimeTable.length;i++){
    let s = +document.getElementById('startSl'+i).value;
    let e = +document.getElementById('endSl'+i).value;
    currList.push({
      name: defaultTimeTable[i].name,
      start: s,
      end: e
    });
  }
  let allRecord = JSON.parse(localStorage.getItem('allTimeRecord') || '{}');
  allRecord[todayKey] = currList;
  localStorage.setItem('allTimeRecord', JSON.stringify(allRecord));
}

// 获取日期标识 YYYY-MM-DD
function getDayKey(){
  let now = new Date();
  let target = new Date(now.getTime() + dayOffset * 24 * 3600 * 1000);
  let y = target.getFullYear();
  let m = target.getMonth() + 1;
  let d = target.getDate();
  return `${y}-${pad(m)}-${pad(d)}`;
}

// 格式化日期显示
function getDayShowText(){
  let now = new Date();
  let target = new Date(now.getTime() + dayOffset * 24 * 3600 * 1000);
  let y = target.getFullYear();
  let m = target.getMonth() + 1;
  let d = target.getDate();
  return `${y}年${m}月${d}日`;
}

// 下一天：保存今日记录 + 偏移+1 刷新
function saveTodayAndNext(){
  saveCurrTimeTable();
  dayOffset++;
  switchCal('day');
}

mainBtn.onclick = function(){
  wrap.classList.toggle('active');
};
calBtn.onclick = function(){
  calPage.style.display = 'block';
  dayOffset = 0;
  switchCal('day');
};
function backToMain(){
  calPage.style.display = 'none';
}

// 切换日周月年
function switchCal(type){
  document.querySelectorAll('.cal-tab button').forEach(btn=>btn.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');

  document.getElementById('curDateTitle').innerText = getDayShowText();
  let html = '';

  if(type === 'day'){
    html = ``;
    let table = getTimeTable();
    
    table.forEach((item, idx)=>{
      html += `
      <div class="time-block">
        <h5>${item.name}</h5>
        <div class="time-show">时段：<span id="timeText${idx}">${pad(item.start)}:00 — ${pad(item.end)}:00</span></div>
        <div style="margin-top:6px">
          <div style="font-size:12px;color:#666;margin:4px 0">开始时间</div>
          <input type="range" min="0" max="23" value="${item.start}" id="startSl${idx}" oninput="changeStart(${idx},this.value)">
          <div style="font-size:12px;color:#666;margin:4px 0">结束时间</div>
          <input type="range" min="0" max="23" value="${item.end}" id="endSl${idx}" oninput="changeEnd(${idx},this.value)">
        </div>
      </div>
      `;
    });

    html += `
      <textarea placeholder="📅 今日计划安排..."></textarea>
      <textarea placeholder="📆 明日提前规划..."></textarea>
      <textarea placeholder="📝 每日总结复盘..." style="margin-top:8px"></textarea>
    `;
  }else if(type === 'week'){
    html = `<h4 style="color:#88aaff;margin-bottom:10px">本周整体规划</h4>
    <textarea placeholder="本周目标、作息规律、任务安排..."></textarea>`;
  }else if(type === 'month'){
    html = `<h4 style="color:#88aaff;margin-bottom:10px">本月规划</h4>
    <textarea placeholder="月度目标、写作进度、生活安排..."></textarea>`;
  }else{
    html = `<h4 style="color:#88aaff;margin-bottom:10px">年度规划</h4>
    <textarea placeholder="年度方向、长期写作计划、生活目标..."></textarea>`;
  }
  calContent.innerHTML = html;
}

// 调节开始时间
function changeStart(idx, val){
  val = parseInt(val);
  let table = getTimeTable();
  table[idx].start = val;
  document.getElementById('timeText'+idx).innerText = pad(val)+':00 — '+pad(table[idx].end)+':00';
}
// 调节结束时间
function changeEnd(idx, val){
  val = parseInt(val);
  let table = getTimeTable();
  table[idx].end = val;
  document.getElementById('timeText'+idx).innerText = pad(table[idx].start)+':00 — '+pad(val)+':00';
}
// 补零
function pad(n){
  return n < 10 ? '0'+n : n;
}
</script>

</body>
</html>
