<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>生活工作台</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  background:#000;
  height:100vh;
  overflow:hidden;
  font-family:system-ui;
  color:#eee;
}
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.main-circle{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#050508;
  border:1px solid #222;
  color:#e5e5e5;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 35px #4050ff26;
  cursor:pointer;
  transition:all 0.3s ease;
}
.main-circle:active{
  transform:scale(0.96);
}
.sub-circle{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#06060a;
  border:1px solid #222;
  color:#ccc;
  font-size:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #4050ff1a;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transition:all 0.4s ease;
}
.inspire-lib{
  top:-150px;
  left:50%;
  transform:translateX(-50%);
}
.book-shelf{
  bottom:-150px;
  left:50%;
  transform:translateX(-50%);
}
.container.active .sub-circle{
  opacity:1;
  visibility:visible;
}
</style>
</head>
<body>

<div class="container" id="wrap">
  <div class="main-circle" id="mainBtn">开始生活</div>
  <div class="sub-circle inspire-lib">灵感库</div>
  <div class="sub-circle book-shelf">书架</div>
</div>

<script>
const wrap = document.getElementById('wrap');
document.getElementById('mainBtn').onclick = function(){
  wrap.classList.toggle('active');
};
</script>

</body>
</html>
